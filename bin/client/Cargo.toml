[package]
name = "celo-client"
version.workspace = true
publish = false
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
# Workspace
alloy-celo-evm.workspace = true
celo-proof.workspace = true
celo-driver.workspace = true
celo-genesis = { workspace = true, features = ["serde"] }
celo-protocol.workspace = true

# Kona
kona-client.workspace = true

# Proof
kona-preimage.workspace = true
kona-executor.workspace = true
kona-proof.workspace = true
kona-std-fpvm.workspace = true
kona-std-fpvm-proc.workspace = true

# Protocol
kona-derive.workspace = true

# Alloy
alloy-consensus.workspace = true
alloy-primitives.workspace = true

# Hokulea (optional – gated behind the `eigenda` feature)
hokulea-eigenda = { workspace = true, optional = true }
hokulea-proof = { workspace = true, optional = true }

# General
cfg-if.workspace = true
tracing.workspace = true

[dev-dependencies]
kona-preimage = { workspace = true, features = ["std"] }

[features]
default = ["client-tracing"]
client-tracing = ["kona-std-fpvm/tracing"]
eigenda = ["dep:hokulea-eigenda", "dep:hokulea-proof"]

[[bin]]
name = "celo-client"
path = "src/client.rs"
