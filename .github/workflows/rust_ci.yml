name: Rust CI

on:
  push:
    tags:
      - celo/v[0-9]*
    branches: [ main ]
  merge_group:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  CARGO_TERM_COLOR: always
  # Debug builds of the reth dep tree with full debuginfo outgrow the
  # ~20-30GB free on ubuntu-latest runners (e2e-tests died with ENOSPC
  # writing an rlib). Line tables keep file:line panic backtraces — in test
  # output and the uploaded celo-reth.log — while shedding the variable/type
  # debuginfo bulk nothing on a runner consumes. The rust-cache prefix keys
  # below are bumped in lockstep (v1) so runners don't restore the stale
  # full-debuginfo caches this invalidates.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only

jobs:
  cargo-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    name: test
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          components: rustfmt
          prefix-key: v1-rust
      - uses: taiki-e/install-action@nextest
      - name: cargo test
        run: just test

  # The trybuild compile-fail guard for `celo_revm::units` (see
  # `crates/celo-reth/tests/units_compile_fail.rs`) recompiles the full
  # dep tree once per UI fixture in a trybuild-managed sub-target, which
  # routinely pushes past the main `test` job's 40-minute budget. Run it
  # in its own job, only on push to main, so PRs aren't blocked on it.
  trybuild:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    name: trybuild
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          components: rustfmt
          prefix-key: v1-rust
      - uses: taiki-e/install-action@nextest
      - name: cargo test (trybuild)
        run: just test-trybuild

  cargo-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      matrix:
        target: [ "native" ]
    name: lint-${{ matrix.target }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          channel: stable
          components: clippy
          prefix-key: ${{ matrix.target }}-v1
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: fmt + lint
        run: just lint-${{ matrix.target }}
      - name: chown target
        run: |
          sudo chown -R $(id -u):$(id -g) ./target

  cargo-build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      matrix:
        target: [ "native" ]
    name: build-${{ matrix.target }}
    continue-on-error: true
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          channel: nightly
          prefix-key: ${{ matrix.target }}-v1
      - name: build
        run: just build-${{ matrix.target }}
      - name: chown target
        run: |
          sudo chown -R $(id -u):$(id -g) ./target
  cargo-udeps:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    name: check-udeps
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          prefix-key: v1-rust
      # Pin the nightly that cargo-udeps runs under. The floating `nightly`
      # channel rolled to a 2026-05-18 build that segfaults cargo-udeps during
      # dependency resolution. Bump this date once a newer nightly is verified.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-05-17
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@cargo-udeps
      - name: cargo udeps
        run: just check-udeps
        env:
          CELO_UDEPS_TOOLCHAIN: nightly-2026-05-17
  cargo-hack:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          prefix-key: v1-rust
      - name: Install clang
        run: sudo apt install clang libclang-dev
      - uses: taiki-e/install-action@cargo-hack
      - name: cargo hack
        run: just hack

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    name: e2e-tests
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          prefix-key: e2e-v1
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1.4.0
        with:
          version: v1.1.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: e2e_test/js-tests/package-lock.json
      - name: Run e2e tests
        run: e2e_test/run_all_tests.sh
      - name: Upload celo-reth log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: celo-reth-log
          path: e2e_test/celo-reth.log
          if-no-files-found: ignore

  check-no-std:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install mold linker
        uses: rui314/setup-mold@v1
      # `rust-toolchain.toml` pins the workspace to 1.94, so cargo auto-switches
      # to that channel regardless of which toolchain is installed here. Install
      # 1.94 explicitly *and* add the riscv32imac-unknown-none-elf target for
      # it — otherwise adding the target against `stable` leaves 1.94 without
      # a sysroot for the target and every cross build fails with
      # `error[E0463]: can't find crate for 'core'`.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
          target: riscv32imac-unknown-none-elf
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          prefix-key: v1-rust
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: check
        run: ./.github/scripts/check_no_std.sh

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: 1.92
