kona-executor   = { git = "https://github.com/celo-org/optimism", rev = "574f3e06f9" }
kona-std-fpvm   = { git = "https://github.com/celo-org/optimism", rev = "574f3e06f9" }
kona-preimage   = { git = "https://github.com/celo-org/optimism", rev = "574f3e06f9" }
